# Product release pipeline: Folco desktop app (Tauri) + standalone folco-cli.
#
# Triggered by pushing a version tag (e.g. `v0.2.0`). App + CLI share ONE
# product version, which is the tag. This builds, for Linux / Windows / macOS:
#   - the Tauri installers, with folco-cli bundled inside as a sidecar
#   - the standalone folco-cli binary, attached to the same GitHub Release
#
# Build order per platform (the app frontend depends on the wasm package):
#   wasm-pack build -> bun install -> build folco-cli -> tauri build
#
# The release is created as a DRAFT so you can review and add notes before
# publishing.
name: Release

on:
  push:
    tags:
      - "v*"
  # Allow manual re-runs against an existing tag from the Actions tab.
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

defaults:
  run:
    # Use bash everywhere (Windows runners include it) so the copy/upload
    # steps are identical across platforms.
    shell: bash

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - platform: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
            ext: ""
          - platform: macos-latest # Intel
            target: x86_64-apple-darwin
            ext: ""

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies (Tauri v2)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Native target for the CLI/app + wasm target for wasm-pack.
          targets: ${{ matrix.target }}, wasm32-unknown-unknown

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Set up bun
        uses: oven-sh/setup-bun@v2

      - name: Build the wasm renderer package
        run: wasm-pack build crates/folco-renderer-wasm --target web --release

      - name: Install frontend dependencies
        working-directory: gui
        run: bun install --frozen-lockfile

      - name: Build folco-cli
        run: cargo build --release --locked -p folco-cli --target ${{ matrix.target }}

      - name: Stage folco-cli as a Tauri sidecar
        run: |
          mkdir -p gui/src-tauri/binaries
          cp "target/${{ matrix.target }}/release/folco-cli${{ matrix.ext }}" \
             "gui/src-tauri/binaries/folco-cli-${{ matrix.target }}${{ matrix.ext }}"

      # Builds the frontend (bun run build) + the app, bundles the installers,
      # and creates/uploads them to a draft GitHub Release for this tag.
      # The extra --config overlay adds the folco-cli sidecar to the bundle.
      - name: Build app + create release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing keys. Empty until you run `tauri signer generate`
          # and add the secrets. While empty AND `createUpdaterArtifacts` is
          # off (the default), builds are simply unsigned and no updater
          # artifacts/latest.json are produced -- nothing breaks.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: gui
          tagName: ${{ github.ref_name }}
          releaseName: "Folco ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          releaseAssetNamePattern: "folco-[version]-[platform]-[arch][ext]"
          # Build for this row's explicit target (needed for macOS Intel on the
          # Apple-Silicon runner) and add the folco-cli sidecar to the bundle.
          args: --target ${{ matrix.target }} --config src-tauri/bundle-cli.json

      - name: Attach standalone folco-cli to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          asset="folco-cli-${{ matrix.target }}${{ matrix.ext }}"
          cp "target/${{ matrix.target }}/release/folco-cli${{ matrix.ext }}" "$asset"
          gh release upload "${{ github.ref_name }}" "$asset" --clobber
