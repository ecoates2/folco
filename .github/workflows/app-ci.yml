# Pull-request build for the Tauri desktop app.
#
# The main CI workflow (ci.yml) excludes folco-gui because building it needs a
# frontend toolchain (bun + wasm-pack) and webkit system libraries. This
# workflow fills that gap: it compiles the app end to end (frontend + Rust) on
# Linux to catch breakage, WITHOUT bundling installers (--no-bundle is fast).
#
# Runs only when the app or the crates it depends on change.
name: App CI

on:
  push:
    branches: [main]
    paths:
      - "gui/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/app-ci.yml"
  pull_request:
    paths:
      - "gui/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/app-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-app:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies (Tauri v2)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: app-ci

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Set up bun
        uses: oven-sh/setup-bun@v2

      - name: Build the wasm renderer package
        run: wasm-pack build crates/folco-renderer-wasm --target web

      - name: Install frontend dependencies
        working-directory: gui
        run: bun install --frozen-lockfile

      - name: Build the app (no installers)
        working-directory: gui
        run: bun run tauri build --no-bundle
